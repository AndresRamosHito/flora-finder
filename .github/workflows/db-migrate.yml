name: Apply Supabase migrations

# Keeps the database in lockstep with the repo. Vercel only deploys the
# frontend, so without this the DB silently drifts behind merged migrations.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal token: https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — the project's database password (raw, no encoding)
# The project ref is public (below); the CLI resolves the connection from it.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: rbjjogsafaplaqfqhohe
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push pending migrations
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::notice::SUPABASE_ACCESS_TOKEN / SUPABASE_DB_PASSWORD not set yet — skipping (see supabase/SETUP.md step 6)."
            exit 0
          fi
          supabase link --project-ref "$PROJECT_REF"
          # --include-all applies pending migrations even when their version
          # timestamp predates the last one already applied remotely. Parallel
          # feature branches can land migrations out of order, and without this
          # `db push` refuses them; all our migrations are idempotent, so it's safe.
          supabase db push --include-all
